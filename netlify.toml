[build]
  # Build command for Astro
  command = "npm run build"
  # Directory to publish (the built files)
  publish = "dist"

[build.environment]
  # Node.js version
  NODE_VERSION = "22"
  # Ensure npm ci is used for faster, reliable builds
  # Include legacy peer deps because @astrojs/tailwind currently has a peer
  # range conflict with Astro 6 in this project dependency set.
  NPM_FLAGS = "--prefer-offline --no-audit --legacy-peer-deps"
